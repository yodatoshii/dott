name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --repo "${{ github.repository }}" --title "${{ github.ref_name }}" --generate-notes

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package + checksum
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="dott-${{ matrix.target }}.tar.gz"
          tar czf "$TARBALL" -C "target/${{ matrix.target }}/release" dott
          if command -v sha256sum > /dev/null 2>&1; then
            sha256sum "$TARBALL" > "$TARBALL.sha256"
          else
            shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "dott-${{ matrix.target }}.tar.gz" "dott-${{ matrix.target }}.tar.gz.sha256" --repo "${{ github.repository }}"

  update-formula:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          BASE="https://github.com/yodatoshicom/dott/releases/download/${VERSION}"

          for arch in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            curl -fsSL --retry 5 --retry-delay 5 --retry-connrefused \
              "${BASE}/dott-${arch}.tar.gz" -o "${arch}.tar.gz"
          done

          ARM_MAC_SHA=$(sha256sum aarch64-apple-darwin.tar.gz      | awk '{print $1}')
          INTEL_MAC_SHA=$(sha256sum x86_64-apple-darwin.tar.gz     | awk '{print $1}')
          LINUX_X64_SHA=$(sha256sum x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          LINUX_ARM_SHA=$(sha256sum aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          {
            echo "ARM_MAC_SHA=$ARM_MAC_SHA"
            echo "INTEL_MAC_SHA=$INTEL_MAC_SHA"
            echo "LINUX_X64_SHA=$LINUX_X64_SHA"
            echo "LINUX_ARM_SHA=$LINUX_ARM_SHA"
            echo "VERSION=${VERSION#v}"
          } >> "$GITHUB_ENV"

      - name: Checkout homebrew-dott repo
        uses: actions/checkout@v4
        with:
          repository: yodatoshicom/homebrew-dott
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          cat > tap/Formula/dott.rb << EOF
          class Dott < Formula
            desc "Private domain search. No middlemen."
            homepage "https://github.com/yodatoshicom/dott"
            version "${{ env.VERSION }}"

            on_macos do
              on_arm do
                url "https://github.com/yodatoshicom/dott/releases/download/v${{ env.VERSION }}/dott-aarch64-apple-darwin.tar.gz"
                sha256 "${{ env.ARM_MAC_SHA }}"
              end
              on_intel do
                url "https://github.com/yodatoshicom/dott/releases/download/v${{ env.VERSION }}/dott-x86_64-apple-darwin.tar.gz"
                sha256 "${{ env.INTEL_MAC_SHA }}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/yodatoshicom/dott/releases/download/v${{ env.VERSION }}/dott-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ env.LINUX_ARM_SHA }}"
              end
              on_intel do
                url "https://github.com/yodatoshicom/dott/releases/download/v${{ env.VERSION }}/dott-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ env.LINUX_X64_SHA }}"
              end
            end

            def install
              bin.install "dott"
            end

            test do
              assert_match "dott", shell_output("#{bin}/dott --help")
            end
          end
          EOF

      - name: Push formula
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dott.rb
          git commit -m "dott ${{ env.VERSION }}"
          git push
