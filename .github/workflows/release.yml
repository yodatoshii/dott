name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: tar czf dott-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release dott

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dott-${{ matrix.target }}.tar.gz

  update-formula:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release assets
        run: |
          VERSION=${GITHUB_REF_NAME}
          BASE="https://github.com/yodatoshii/dott/releases/download/${VERSION}"

          curl -sL "${BASE}/dott-aarch64-apple-darwin.tar.gz" -o arm.tar.gz
          curl -sL "${BASE}/dott-x86_64-apple-darwin.tar.gz" -o intel.tar.gz
          curl -sL "${BASE}/dott-x86_64-unknown-linux-gnu.tar.gz" -o linux.tar.gz

          ARM_SHA=$(sha256sum arm.tar.gz | awk '{print $1}')
          INTEL_SHA=$(sha256sum intel.tar.gz | awk '{print $1}')
          LINUX_SHA=$(sha256sum linux.tar.gz | awk '{print $1}')

          echo "ARM_SHA=$ARM_SHA" >> $GITHUB_ENV
          echo "INTEL_SHA=$INTEL_SHA" >> $GITHUB_ENV
          echo "LINUX_SHA=$LINUX_SHA" >> $GITHUB_ENV
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Checkout dott repo
        uses: actions/checkout@v4
        with:
          repository: yodatoshii/homebrew-dott
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          cat > tap/Formula/dott.rb << EOF
          class Dott < Formula
            desc "Private domain search. No middlemen."
            homepage "https://github.com/yodatoshii/dott"
            version "${{ env.VERSION }}"

            on_macos do
              on_arm do
                url "https://github.com/yodatoshii/dott/releases/download/v${{ env.VERSION }}/dott-aarch64-apple-darwin.tar.gz"
                sha256 "${{ env.ARM_SHA }}"
              end
              on_intel do
                url "https://github.com/yodatoshii/dott/releases/download/v${{ env.VERSION }}/dott-x86_64-apple-darwin.tar.gz"
                sha256 "${{ env.INTEL_SHA }}"
              end
            end

            on_linux do
              url "https://github.com/yodatoshii/dott/releases/download/v${{ env.VERSION }}/dott-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ env.LINUX_SHA }}"
            end

            def install
              bin.install "dott"
            end

            test do
              assert_match "dott", shell_output("#{bin}/dott --help")
            end
          end
          EOF

      - name: Push formula
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dott.rb
          git commit -m "Update formula to ${{ env.VERSION }}"
          git push
